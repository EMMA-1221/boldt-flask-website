<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Admin</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@0.9.4/css/bulma.min.css">
</head>
<body>
  <nav class="navbar has-background-danger-dark">
    <div class="navbar-menu">
      <div class="navbar-start">
        <a class="navbar-item has-text-white" href="/">Home</a>
        <a class="navbar-item has-text-white" href="/tool">Tool</a>
      </div>
    </div>
  </nav>
  <div class="container mt-6">
    <h1 class="is-size-2 mb-4">User Management</h1>
    <table class="table is-striped is-fullwidth">
      <thead>
        <tr>
          <th>Username</th>
          <th>Email</th>
          <th>Admin</th>
          <th>Action</th>
        </tr>
      </thead>
      <tbody>
        {% for user in users %}
        <tr>
          <td>{{ user.username }}</td>
          <td>{{ user.email }}</td>
          <td>{{ "Yes" if user.is_admin else "No" }}</td>
          <td><a href="/admin/toggle/{{ user.id }}" class="button is-small is-warning">Toggle Admin</a></td>
        </tr>
        {% endfor %}
      </tbody>
    </table>
  </div>
</body>
</html>
