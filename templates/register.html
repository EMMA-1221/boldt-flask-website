<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Register</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@0.9.4/css/bulma.min.css">
</head>
<body>
  <nav class="navbar has-background-danger-dark">
    <div class="navbar-menu">
      <div class="navbar-start">
        <a class="navbar-item has-text-white" href="/">Home</a>
      </div>
    </div>
  </nav>
  <div class="container mt-6" style="max-width:400px">
    <h1 class="is-size-2 mb-4">Register</h1>
    {% with messages = get_flashed_messages() %}
      {% if messages %}
        <div class="notification is-danger">{{ messages[0] }}</div>
      {% endif %}
    {% endwith %}
    <form method="POST">
      <div class="field">
        <label class="label">Username</label>
        <input class="input" type="text" name="username" required>
      </div>
      <div class="field">
        <label class="label">Email</label>
        <input class="input" type="email" name="email" required>
      </div>
      <div class="field">
        <label class="label">Password</label>
        <input class="input" type="password" name="password" required>
      </div>
      <button class="button is-danger mt-3" type="submit">Register</button>
    </form>
    <p class="mt-3">Already have an account? <a href="/login">Login</a></p>
  </div>
</body>
</html>
